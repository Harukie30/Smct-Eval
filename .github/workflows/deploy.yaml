name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.DEPLOY }}

    - name: Deploy to server
      run: ssh -o StrictHostKeyChecking=no webserver@192.168.1.100 "/home/webserver/scripts/deploy_scripts/smct_eval.sh"