name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.DEPLOY }}

    - name: Deploy to server
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=60 -o ServerAliveCountMax=5 webserver@192.168.1.100
          export COMPOSE_HTTP_TIMEOUT=120
          cd /home/webserver/systems/Performance_Evaluation/Smct_Eval
          git pull
          docker-compose down
          docker-compose up --build -d
